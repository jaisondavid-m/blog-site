services:
  mysql:
    image: mysql:8.0
    container_name: blog_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
      - --performance-schema=OFF
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    command:
      - redis-server 
      - --appendonly
      - "yes"
      - --maxmemory 
      - 64mb 
      - --maxmemory-policy 
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./server
    container_name: blog_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - ./server/.env

    volumes:
      # - ./server/.env:/app/.env:ro
      - uploads_data:/app/uploads

    expose:
      = "8080"
    
    networks:
      - internal

  web:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: blog_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - ${HTTP_PORT}:80
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  uploads_data: